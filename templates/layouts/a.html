<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>KKAL — Главная</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</head>

<body class="bg-[#F6A5A5] font-sans min-h-screen">
{% include 'includes/header.html' %}

<main class="max-w-2xl mx-auto p-6">
    <div class="mb-6 flex items-center gap-4">
        <a href="{% url 'nutricion' %}" class="text-white opacity-80 hover:opacity-100 transition text-2xl">←</a>
        <h2 class="text-white text-2xl font-bold">Добавление в дневник</h2>
    </div>

    <div
        class="bg-[#835757] rounded-[2.5rem] p-8 text-white shadow-2xl border border-white/10 relative overflow-hidden">

        <!-- Вкладки (теперь это ссылки) -->
        <div class="flex gap-2 mb-8 bg-white/10 p-1.5 rounded-2xl relative z-10">
            <!-- Ссылка на Поиск -->
            <a href="{% url 'search-product' %}"
                class="flex-1 py-3 text-center rounded-xl font-bold transition-all {% if active_tab != 'create' %}bg-white text-[#835757] shadow-md{% else %}text-white hover:bg-white/20{% endif %}">
                🔍 Поиск по базе
            </a>

            <!-- Ссылка на Создание -->
            <a href="{% url 'create-product' %}"
                class="flex-1 py-3 text-center rounded-xl font-bold transition-all {% if active_tab == 'create' %}bg-white text-[#835757] shadow-md{% else %}text-white hover:bg-white/20{% endif %}">
                ✨ Создать свое
            </a>
        </div>
       {% block content %}
        {% endblock %}
    </div>
</main>

<style>
    /* Прячем стрелочки у инпутов типа number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    /* Красивый скроллбар для списка продуктов */
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
    }
</style>

</body>

</html>
