{% extends 'layouts/b.html' %}


{% block content %}

{# Центрируем контейнер на странице для лучшего вида #}
<div class="min-h-screen flex items-center justify-center p-4">

    {# Карточка подтверждения #}
    <div class="w-full max-w-md bg-white/10 p-8 rounded-2xl shadow-lg border border-white/20 text-center">

        <h1 class="text-2xl font-bold text-white mb-2">Подтвердите удаление</h1>
        <p class="mb-8 text-white/70">Вы уверены, что хотите безвозвратно удалить этот прием пищи?</p>

        <form method='POST'>
            {% csrf_token %}

            <!-- Контейнер для кнопок с flex-раскладкой для красивого расположения -->
            <div class="flex justify-center items-center gap-4">

                <!--
                  Кнопка "Удалить" (Confirm)
                  - Красный цвет для опасного действия
                  - Иконка корзины
                  - Плавные переходы и тень
                -->
                <button type="submit"
                        class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow-md transition-all duration-200 ease-in-out transform hover:scale-105">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd" />
                    </svg>
                    <span>Удалить</span>
                </button>

                <!--
                  Кнопка "Отмена" (Go Back)
                  - Нейтральный цвет для безопасного действия
                  - Стиль вторичной кнопки
                -->
                <a href="{% url 'nutricion' %}"
                   class="inline-flex items-center justify-center px-6 py-3 bg-white/20 hover:bg-white/30 text-white font-bold rounded-lg transition-colors duration-200">
                    Отмена
                </a>

            </div>
        </form>

    </div>
</div>

{% endblock %}
