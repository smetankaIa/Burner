{% extends 'layouts/a.html' %}
{% block content %}
<!-- ================= РАЗДЕЛ СОЗДАНИЯ СВОЕГО ПРОДУКТА ================= -->
        <div class="space-y-8 block transition-opacity duration-300">
            <form method="post" action="{% url 'create-product' %}">
                {% csrf_token %}
              <div class="mb-6">
                <div class="flex flex-col gap-2  ">
                    <label class="text-xs uppercase font-bold opacity-70 ml-2">Название продукта</label>
                    <input type="text" name="title" id="{{form.title.id_for_label}}"
                        value="{{ form.title.value|default:'' }}" placeholder="Например: Домашняя запеканка"
                        class="bg-white/10 border border-white/20 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-white/50 transition placeholder-white/40">
                    {% if form.title.errors %}<p class="text-red-300 text-[10px] ml-2">{{ form.title.errors.0 }}</p>
                    {% endif %}
                  </div>
                </div>
                <div class="mb-6">
               
                </div>
                
                <div class="grid grid-cols-4 gap-4 bg-white/5 p-4 rounded-3xl border border-white/10">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] uppercase font-bold opacity-70 text-center">Ккал</label>
                        <input type="number" step="0.1" name="calories" placeholder="0"
                            value="{{ form.calories.value|stringformat:'s'|default:'' }}"
                            class="bg-white/10 border border-white/20 p-2 rounded-xl outline-none focus:ring-2 focus:ring-white/50 transition text-lg font-black text-center placeholder-white/30">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] uppercase font-bold opacity-70 text-center">Белки</label>
                        <input type="number" step="0.1" name="protein" placeholder="0"
                            value="{{ form.protein.value|stringformat:'s'|default:'' }}"
                            class="bg-blue-400/20 border border-blue-400/30 p-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-400/50 transition text-lg font-black text-center placeholder-white/30">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] uppercase font-bold opacity-70 text-center">Жиры</label>
                        <input type="number" step="0.1" name="fat" placeholder="0"
                            value="{{ form.fat.value|stringformat:'s'|default:'' }}"
                            class="bg-yellow-400/20 border border-yellow-400/30 p-2 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400/50 transition text-lg font-black text-center placeholder-white/30">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] uppercase font-bold opacity-70 text-center">Угл.</label>
                        <input type="number" step="0.1" name="carbs" placeholder="0"
                            value="{{form.carbs.value|stringformat:'s'|default:''}}"
                            class="bg-green-400/20 border border-green-400/30 p-2 rounded-xl outline-none focus:ring-2 focus:ring-green-400/50 transition text-lg font-black text-center placeholder-white/30">
                    </div>
                </div>
      
                
                <div class="pt-6 flex flex-col gap-3">
                    <button type="submit"
                        class="w-full bg-white text-[#835757] py-4 rounded-2xl font-black text-lg hover:scale-[1.02] active:scale-95 transition shadow-xl">
                        Сохранить в базу
                    </button>
                </div>
            </form>
        </div>

{% endblock %}
